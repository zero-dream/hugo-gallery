<!doctype html>
{{ $theme := .Site.Params.defaultTheme }}
<html class="{{ if (eq $theme "light") }}light{{ else if (eq $theme "dark") }}dark{{ end }}" lang="{{ site.Language.Locale | default "en" }}">
  <head>
    {{ partial "head.html" . }}
    {{ block "head-assets" . }}{{ end }}
    {{ partial "head-custom.html" . }}
  </head>
  <body>
    {{ block "header" . }}{{ partial "header.html" . }}{{ end }}
    <main>
      {{ block "main" . }}{{ end }}
    </main>
    {{ block "footer" . }}{{ partialCached "footer.html" . }}{{ end }}
  </body>
</html>
