{{ define "main" }}
{{ partial "components/title.html" . }}
<section class="terms">
	<div class="term-list">
		{{ range .Data.Terms.Alphabetical }}
			{{ partial "components/term.html" (dict
				"Term" .Term
				"Pages" .Pages
				"Count" .Count
				"Page" .Page
				)
			}}
		{{ end }}
	</div>
</section>
{{ end }}
