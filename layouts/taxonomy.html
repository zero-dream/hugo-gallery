{{ define "main" }}
{{ partial "components/title.html" . }}
<section class="terms">
	<div class="term-list">
		{{ range .Data.Terms.Alphabetical }}
			{{ partial "components/term.html" (dict
				"Term" .Term
				"Page" .WeightedPages.Page
				"Count" .WeightedPages.Count
				"WeightedPages" .WeightedPages
				)
			}}
		{{ end }}
	</div>
</section>
{{ end }}
