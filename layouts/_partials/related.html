{{ $related := partial "data/pages.html" (site.RegularPages.Related .) | first 3 }}
{{ with $related }}
  <hgroup style="margin-top: 8rem">
    <h2>{{ T "relatedAlbums" }}</h2>
  </hgroup>
  <section class="galleries">
    {{ range . }}
      {{ partial "album.html" . }}
    {{ end }}
  </section>
{{ end }}
