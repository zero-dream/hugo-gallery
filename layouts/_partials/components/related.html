{{ $related := partial "utils/filter-pages.html" (site.RegularPages.Related .) }}
{{ $related = $related | first site.Params.relatedLimit }}
{{ with $related }}
	<hgroup class="hgroup-h2">
		<h2>{{ T "relatedAlbums" }}</h2>
	</hgroup>
	<section class="albums">
		{{ range . }}
			{{ partial "components/album.html" . }}
		{{ end }}
	</section>
{{ end }}
