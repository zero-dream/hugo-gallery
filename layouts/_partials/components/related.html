{{ $enableRelated := $.Param "related.enable" }}
{{ if $enableRelated }}
	{{ $related := site.RegularPages.Related $ }}
	{{ with $related }}
		<hgroup class="hgroup-h2">
			<h2>{{ T "relatedAlbums" }}</h2>
		</hgroup>
		{{ partial "components/albums.html" (dict "ctx" $ "type" "related" "related" .) }}
	{{ end }}
{{ end }}
