params:
  # General
  title: "Gallery"
  description: "A uniquely styled Hugo photo gallery theme."
  author:
    name: "YourName"
    email: "user@example.com"
  defaultTheme: "auto" # Value: auto; light; dark;

  # .Param
  downImage:
    enable: true
    imageSpec: "fit 3200x3200"
  album:
    imageSpec:
      thumbnail: "fit 1200x1200"
  gallery:
    sort:
      - { key: "params.weight", order: "asc" }
      - { key: "params.date", order: "desc" }
      - { key: "name", order: "asc" }
      - { key: "title", order: "asc" }
    photoSwipe:
      caption:
        enable: true
        data:
          - { format: "ISO ${Exif.ISO}", minWidth: "4rem" }
          - { format: "${Exif.FocalLengthIn35mmFormat} mm", minWidth: "4rem" }
          - { format: "${Exif.ExposureCompensation} ev", minWidth: "4rem" }
          - { format: "f ${Exif.FNumber}", minWidth: "4rem" }
          - { format: "${Exif.ExposureTime} s", minWidth: "5rem" }
      fileInfo:
        enable: true
        firstBigger: true
        data:
          - { format: "${Title-title}" }
          - { format: '${SmartDate-dateFormat-2006\-01\-02 15:04:05 \-0700 MST}' }
          - { format: "${FileExt} · ${Megapixel} MP · ${Resolution} · ${FileSize-div-1048576-%.2f} MB" }
          - { format: "${Exif.Make} ${Exif.Model}" }
    justified:
      gutterH: 10
      gutterV: 10
      rowHeight: 320
      rowHeightTolerance: 0.25
    imageSpec:
      thumbnail: "fit 600x600"
      lightbox: "fit 1600x1600"
  watermark:
    path: "images/watermark/watermark.png" # assets/...
    opacity: 0.2
    size: 0.05
    x: 0.5
    y: 0.5

  # site.Params
  imageSpec:
    rssCover: "fill 900x600"
    featured: "fit 1600x1600"
    openGraph: "fit 1600x1600"
  socialIcons:
    github: "https://github.com/zero-dream/hugo-gallery/"
    facebook: "https://www.facebook.com/"
    youtube: "https://www.youtube.com/"
    email: "mailto:user@example.com"
    whatsapp: "1234567890"
